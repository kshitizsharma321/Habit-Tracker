<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Habit Tracker</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
		/>
		<style>
			:root {
				--bg-primary: #f8fafc;
				--bg-secondary: #e2e8f0;
				--card-bg: #ffffff;
				--text-primary: #1e293b;
				--text-secondary: #64748b;
				--border-color: #e2e8f0;
				--success-color: #10b981;
				--danger-color: #ef4444;
				--accent-color: #6366f1;
				--shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				--shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.15);
			}

			[data-theme='dark'] {
				--bg-primary: #0f172a;
				--bg-secondary: #1e293b;
				--card-bg: #334155;
				--text-primary: #f1f5f9;
				--text-secondary: #cbd5e1;
				--border-color: #475569;
				--success-color: #22c55e;
				--danger-color: #f87171;
				--accent-color: #818cf8;
				--shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
				--shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.5);
			}

			/* Reduced transitions - only on essential elements */
			.card,
			.btn,
			.streak-day-enhanced {
				transition:
					transform 0.2s ease,
					box-shadow 0.2s ease;
			}

			body {
				background: var(--bg-primary);
				/* Simplified background - single gradient instead of multiple radials */
				background-image: linear-gradient(
					135deg,
					rgba(99, 102, 241, 0.1) 0%,
					rgba(168, 85, 247, 0.05) 100%
				);
				min-height: 100vh;
				color: var(--text-primary);
				font-family:
					system-ui,
					-apple-system,
					sans-serif; /* System fonts for better performance */
			}

			[data-theme='dark'] body {
				background-image: linear-gradient(
					135deg,
					rgba(99, 102, 241, 0.15) 0%,
					rgba(168, 85, 247, 0.1) 100%
				);
			}

			.card {
				background: var(--card-bg);
				border: 1px solid var(--border-color);
				box-shadow: var(--shadow);
				border-radius: 12px;
				color: var(--text-primary);
			}

			.card:hover {
				box-shadow: var(--shadow-hover);
				transform: translateY(-2px);
			}

			.habit-card {
				background: var(--card-bg);
			}

			.habit-card:hover {
				transform: translateY(-4px);
			}

			.month-header {
				border-left: 4px solid var(--accent-color);
				padding: 8px 12px;
				color: var(--text-primary);
				background: rgba(99, 102, 241, 0.05);
				border-radius: 0 8px 8px 0;
				margin-bottom: 12px;
			}

			/* Simplified animations - removed complex keyframes */
			.success-animation {
				animation: quickPulse 0.3s ease-out;
			}

			.failure-animation {
				animation: quickShake 0.3s ease-out;
			}

			@keyframes quickPulse {
				50% {
					transform: scale(1.02);
					background-color: rgba(34, 197, 94, 0.1);
				}
			}

			@keyframes quickShake {
				25% {
					transform: translateX(-4px);
				}
				75% {
					transform: translateX(4px);
				}
			}

			.enhanced-streak-calendar {
				background: var(--card-bg);
				border-radius: 12px;
				padding: 1.5rem;
				box-shadow: var(--shadow);
				border: 1px solid var(--border-color);
			}

			.calendar-legend {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				margin-bottom: 1rem;
				font-size: 12px;
				color: var(--text-secondary);
			}

			.legend-squares {
				display: flex;
				gap: 2px;
			}

			.calendar-grid {
				display: flex;
				gap: 3px;
				overflow-x: auto;
			}

			.calendar-week {
				display: flex;
				flex-direction: column;
				gap: 3px;
			}

			.streak-day-enhanced {
				width: 36px;
				height: 36px;
				border-radius: 6px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				font-size: 9px;
				cursor: pointer;
				border: 1px solid var(--border-color);
			}

			.streak-day-enhanced.today {
				box-shadow: 0 0 0 2px var(--accent-color);
				border-color: var(--accent-color);
			}

			.streak-day-enhanced:hover {
				transform: scale(1.1);
			}

			/* Simplified intensity levels - removed gradients */
			.intensity-0 {
				background-color: var(--bg-secondary);
				color: var(--text-secondary);
			}
			.intensity-1 {
				background-color: #dcfce7;
				color: #166534;
			}
			.intensity-2 {
				background-color: #bbf7d0;
				color: #15803d;
			}
			.intensity-3 {
				background-color: #86efac;
				color: #166534;
			}
			.intensity-4 {
				background-color: #22c55e;
				color: white;
			}

			[data-theme='dark'] .intensity-0 {
				background-color: var(--bg-secondary);
			}
			[data-theme='dark'] .intensity-1 {
				background-color: rgba(34, 197, 94, 0.3);
				color: #86efac;
			}
			[data-theme='dark'] .intensity-2 {
				background-color: rgba(34, 197, 94, 0.5);
				color: #bbf7d0;
			}
			[data-theme='dark'] .intensity-3 {
				background-color: rgba(34, 197, 94, 0.7);
				color: #dcfce7;
			}
			[data-theme='dark'] .intensity-4 {
				background-color: #22c55e;
				color: white;
			}

			.day-number {
				font-weight: 600;
				line-height: 1;
				font-size: 10px;
			}

			.day-emoji {
				font-size: 8px;
				margin-top: 1px;
			}

			.theme-toggle {
				position: fixed;
				top: 20px;
				right: 20px;
				z-index: 1000;
				background: var(--card-bg);
				border: 1px solid var(--border-color);
				border-radius: 8px;
				padding: 8px 12px;
				box-shadow: var(--shadow);
			}

			.progress-section {
				background: var(--card-bg);
				border-radius: 12px;
				padding: 1.5rem;
				box-shadow: var(--shadow);
				border: 1px solid var(--border-color);
			}

			.progress {
				height: 10px;
				border-radius: 6px;
				background: var(--bg-secondary);
			}

			.progress-bar {
				background: var(--success-color);
				border-radius: 6px;
			}

			.keyboard-hint {
				font-size: 0.85rem;
				color: var(--text-secondary);
				margin-top: 0.75rem;
				padding: 8px 12px;
				background: rgba(99, 102, 241, 0.1);
				border-radius: 8px;
				border: 1px solid rgba(99, 102, 241, 0.2);
			}

			.btn {
				border-radius: 8px;
				font-weight: 600;
			}

			.btn:hover {
				transform: translateY(-1px);
				box-shadow: var(--shadow-hover);
			}

			.btn-success {
				background: var(--success-color);
				border: none;
				color: white;
			}

			.btn-danger {
				background: var(--danger-color);
				border: none;
				color: white;
			}

			.btn-outline-primary {
				border: 2px solid var(--accent-color);
				color: var(--accent-color);
				background: transparent;
			}

			.btn-outline-primary:hover {
				background: var(--accent-color);
				color: white;
			}

			.btn-outline-info {
				border: 2px solid #06b6d4;
				color: #06b6d4;
				background: transparent;
			}

			.btn-outline-info:hover {
				background: #06b6d4;
				color: white;
			}

			.badge {
				border-radius: 6px;
				padding: 6px 10px;
				background: var(--success-color);
			}

			.modal-content {
				background: var(--card-bg);
				border: 1px solid var(--border-color);
				border-radius: 12px;
				color: var(--text-primary);
				box-shadow: var(--shadow-hover);
			}

			.modal-header {
				border-bottom: 1px solid var(--border-color);
			}

			.form-control {
				background: var(--card-bg);
				border: 1px solid var(--border-color);
				border-radius: 6px;
				color: var(--text-primary);
			}

			.form-control:focus {
				background: var(--card-bg);
				border-color: var(--accent-color);
				color: var(--text-primary);
				box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
			}

			.text-muted {
				color: var(--text-secondary) !important;
			}

			.border-success {
				border-color: var(--success-color) !important;
			}

			.border-danger {
				border-color: var(--danger-color) !important;
			}

			@media (max-width: 768px) {
				.container {
					padding: 1rem;
				}

				.habit-card .btn {
					font-size: 1.1rem;
					padding: 0.7rem 1.3rem;
				}

				.theme-toggle {
					position: relative;
					top: auto;
					right: auto;
					margin-bottom: 1rem;
				}

				.streak-day-enhanced {
					width: 32px;
					height: 32px;
				}

				.calendar-grid {
					gap: 2px;
				}

				.calendar-week {
					gap: 2px;
				}
			}

			/* Removed complex animations and effects for performance */
			.streak-milestone {
				animation: simplePulse 1s ease-in-out 3;
			}

			@keyframes simplePulse {
				50% {
					transform: scale(1.05);
				}
			}
		</style>
	</head>
	<body>
		<!-- Theme Toggle -->
		<div class="theme-toggle">
			<button class="btn btn-outline-secondary" onclick="toggleTheme()">
				<span id="themeIcon">🌙</span>
			</button>
		</div>

		<div class="container py-5">
			<div class="text-center mb-4">
				<h1>
					Current Streak:
					<span id="streakCount" class="badge bg-success">0</span>
					<span id="streakEmoji">🔥</span>
				</h1>
				<p class="text-muted" id="streakMessage">Keep going!</p>
			</div>

			<!-- Enhanced Streak Calendar -->
			<div class="card shadow-sm mb-4">
				<div class="card-body">
					<h5 class="card-title">Last 30 Days</h5>
					<div id="streakCalendar" class="enhanced-streak-calendar"></div>
				</div>
			</div>

			<!-- Progress Section -->
			<div id="progressSection" class="progress-section mb-4"></div>

			<div class="text-center mb-4">
				<button class="btn btn-outline-primary me-2" onclick="downloadExcel()">
					📊 Download Excel Backup
				</button>
				<button class="btn btn-outline-info" onclick="showStats()">
					📈 Advanced Stats
				</button>
			</div>

			<div class="card shadow-sm mb-4 habit-card">
				<div class="card-body text-center">
					<div class="d-flex justify-content-center mb-3">
						<div class="form-check form-switch">
							<input
								class="form-check-input"
								type="checkbox"
								id="manualDateToggle"
							/>
							<label class="form-check-label" for="manualDateToggle"
								>Log for different date</label
							>
						</div>
					</div>

					<div id="manualDateContainer" class="mb-3" style="display: none">
						<label for="manualDatePicker" class="form-label"
							>Select Date:</label
						>
						<input
							type="text"
							class="form-control cursor-pointer"
							id="manualDatePicker"
							placeholder="Select date"
						/>
					</div>

					<h4>
						Did you complete your habit on <span id="displayDate"></span>?
					</h4>
					<div class="mt-3">
						<button
							class="btn btn-success me-2"
							onclick="handleResponse('yes')"
						>
							✅ Yes
						</button>
						<button class="btn btn-danger" onclick="handleResponse('no')">
							❌ No
						</button>
					</div>
					<div class="keyboard-hint">
						💡 Tip: Press <kbd>Y</kbd> for Yes or <kbd>N</kbd> for No
					</div>
				</div>
			</div>

			<div class="d-flex justify-content-between mb-3">
				<h3>Your Habit History</h3>
			</div>

			<div id="statsContainer" class="mb-4"></div>
			<div id="resultsContainer"></div>
		</div>

		<!-- Confirmation Modal -->
		<div class="modal fade" id="confirmModal" tabindex="-1">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">Confirm Response</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
						></button>
					</div>
					<div class="modal-body">
						Are you sure you want to override your previous response for
						<span id="modalDateDisplay"></span>?
					</div>
					<div class="modal-footer">
						<button
							type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal"
						>
							Cancel
						</button>
						<button type="button" class="btn btn-primary" id="confirmBtn">
							Yes, override
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Advanced Stats Modal -->
		<div class="modal fade" id="statsModal" tabindex="-1">
			<div class="modal-dialog modal-lg">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">📈 Advanced Statistics</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
						></button>
					</div>
					<div class="modal-body" id="advancedStatsContent"></div>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
		<script>
			// Constants
			const API_URL = 'http://localhost:3000/api';
			const THEME_KEY = 'habitTheme';
			const TIMEZONE = 'Asia/Kolkata';
			const STREAK_EMOJIS = {
				0: '😢',
				3: '👍',
				7: '🔥',
				14: '🚀',
				21: '🏆',
				30: '💎',
				60: '🦄',
				90: '🏅',
			};

			// Optimized date formatters
			const dateFormatters = {
				display: (date) =>
					date.toLocaleDateString('en-US', {
						weekday: 'long',
						month: 'long',
						day: 'numeric',
						year: 'numeric',
						timeZone: TIMEZONE,
					}),
				short: (date) =>
					date.toLocaleDateString('en-US', {
						weekday: 'short',
						month: 'short',
						day: 'numeric',
						timeZone: TIMEZONE,
					}),
				monthYear: (date) =>
					date.toLocaleDateString('en-US', {
						month: 'long',
						year: 'numeric',
						timeZone: TIMEZONE,
					}),
			};

			// DOM Elements - cached once
			const elements = {
				displayDate: document.getElementById('displayDate'),
				streakCount: document.getElementById('streakCount'),
				streakEmoji: document.getElementById('streakEmoji'),
				streakMessage: document.getElementById('streakMessage'),
				resultsContainer: document.getElementById('resultsContainer'),
				statsContainer: document.getElementById('statsContainer'),
				streakCalendar: document.getElementById('streakCalendar'),
				progressSection: document.getElementById('progressSection'),
				confirmModal: new bootstrap.Modal('#confirmModal'),
				statsModal: new bootstrap.Modal('#statsModal'),
				confirmBtn: document.getElementById('confirmBtn'),
				manualDateToggle: document.getElementById('manualDateToggle'),
				manualDateContainer: document.getElementById('manualDateContainer'),
				manualDatePicker: document.getElementById('manualDatePicker'),
				themeIcon: document.getElementById('themeIcon'),
				advancedStatsContent: document.getElementById('advancedStatsContent'),
			};

			// State
			let habitData = {};
			let pendingResponse = null;
			let selectedDate = new Date();
			let datePicker = null;
			let sortedKeysCache = null;
			let isLoading = false;

			// Initialize
			document.addEventListener('DOMContentLoaded', init);

			async function init() {
				loadTheme();
				setupDatePicker();
				setupEventListeners();
				updateDisplayDate();

				// Load data from database
				await loadData();
				fillMissingDays();
				await saveData();
				updateUI();
				checkFirstTimeUser();
			}

			function setupDatePicker() {
				datePicker = flatpickr(elements.manualDatePicker, {
					maxDate: 'today',
					dateFormat: 'Y-m-d',
					onChange: function (selectedDates) {
						if (selectedDates.length) {
							selectedDate = selectedDates[0];
							updateDisplayDate();
						}
					},
				});
			}

			function setupEventListeners() {
				elements.confirmBtn.addEventListener('click', confirmOverride);
				elements.manualDateToggle.addEventListener('change', function () {
					elements.manualDateContainer.style.display = this.checked
						? 'block'
						: 'none';
					if (!this.checked) {
						selectedDate = new Date();
						updateDisplayDate();
					} else {
						datePicker.setDate(selectedDate);
					}
				});

				// Optimized keyboard shortcuts
				document.addEventListener('keydown', (e) => {
					if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')
						return;

					if (e.key === 'y' || e.key === 'Y') {
						e.preventDefault();
						handleResponse('yes');
					} else if (e.key === 'n' || e.key === 'N') {
						e.preventDefault();
						handleResponse('no');
					}
				});
			}

			function checkFirstTimeUser() {
				if (Object.keys(habitData).length === 0) {
					setTimeout(() => {
						alert(
							'Welcome to Habit Tracker! Click "Yes" or "No" each day to track your habit. You can also use keyboard shortcuts: Y for Yes, N for No.',
						);
					}, 500);
				}
			}

			// Optimized data functions
			function getSortedKeys() {
				if (!sortedKeysCache) {
					sortedKeysCache = Object.keys(habitData).sort(
						(a, b) => new Date(a) - new Date(b),
					);
				}
				return sortedKeysCache;
			}

			function invalidateCache() {
				sortedKeysCache = null;
			}

			async function loadData() {
				try {
					const response = await fetch(`${API_URL}/habits`);
					if (!response.ok) throw new Error('Failed to load data');
					habitData = await response.json();
					invalidateCache();
				} catch (error) {
					console.error('Failed to load habit data:', error);
					alert(
						'Failed to connect to server. Please make sure the backend is running.',
					);
					habitData = {};
				}
			}

			async function saveData() {
				try {
					const response = await fetch(`${API_URL}/habits/bulk`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
						},
						body: JSON.stringify(habitData),
					});
					if (!response.ok) throw new Error('Failed to save data');
					invalidateCache();
				} catch (error) {
					console.error('Failed to save habit data:', error);
				}
			}

			function updateDisplayDate() {
				elements.displayDate.textContent = dateFormatters.display(selectedDate);
			}

			function getDateKey(date) {
				return date.toLocaleDateString('en-CA', { timeZone: TIMEZONE });
			}

			function handleResponse(response) {
				const dateKey = getDateKey(selectedDate);

				if (habitData[dateKey]) {
					pendingResponse = { dateKey, response };
					document.getElementById('modalDateDisplay').textContent =
						dateFormatters.display(selectedDate);
					elements.confirmModal.show();
				} else {
					saveResponse(dateKey, response);
					showResponseAnimation(response);
				}
			}

			async function confirmOverride() {
				if (pendingResponse) {
					await saveResponse(pendingResponse.dateKey, pendingResponse.response);
					showResponseAnimation(pendingResponse.response);
					elements.confirmModal.hide();
					pendingResponse = null;
				}
			}

			async function saveResponse(dateKey, response) {
				if (isLoading) return;
				isLoading = true;

				try {
					// Save single entry to database
					const apiResponse = await fetch(`${API_URL}/habits`, {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
						},
						body: JSON.stringify({ date: dateKey, response }),
					});

					if (!apiResponse.ok) throw new Error('Failed to save response');

					habitData[dateKey] = response;
					fillMissingDays();
					await saveData();
					updateUI();
				} catch (error) {
					console.error('Failed to save response:', error);
					alert('Failed to save. Please check your connection.');
				} finally {
					isLoading = false;
				}

				if (elements.manualDateToggle.checked) {
					elements.manualDateToggle.checked = false;
					elements.manualDateContainer.style.display = 'none';
					selectedDate = new Date();
					updateDisplayDate();
				}
			}

			function showResponseAnimation(response) {
				const card = document.querySelector('.habit-card');
				const animationClass =
					response === 'yes' ? 'success-animation' : 'failure-animation';

				card.classList.add(animationClass);
				setTimeout(() => {
					card.classList.remove(animationClass);
				}, 300);
			}

			// Debounced UI update for better performance
			let updateUITimeout;
			function updateUI() {
				clearTimeout(updateUITimeout);
				updateUITimeout = setTimeout(() => {
					updateStreakCounter();
					updateStats();
					updateProgressBars();
					// renderEnhancedStreakCalendar();
					renderSimpleStreakCalendar();
					renderHistory();
				}, 50);
			}

			function fillMissingDays() {
				const keys = getSortedKeys();
				if (keys.length === 0) return;

				const firstDate = new Date(keys[0]);
				const today = new Date();
				today.setHours(0, 0, 0, 0);

				const currentDate = new Date(firstDate);
				let hasChanges = false;

				while (currentDate <= today) {
					const dateKey = getDateKey(currentDate);
					if (!habitData[dateKey]) {
						habitData[dateKey] = 'no';
						hasChanges = true;
					}
					currentDate.setDate(currentDate.getDate() + 1);
				}

				if (hasChanges) {
					invalidateCache();
				}
			}

			function calculateStreaks() {
				const keys = getSortedKeys();
				if (keys.length === 0) {
					return { streak: 0, longestStreak: 0 };
				}

				let currentStreak = 0;
				for (let i = keys.length - 1; i >= 0; i--) {
					if (habitData[keys[i]] === 'yes') {
						currentStreak++;
					} else {
						break;
					}
				}

				let longestStreak = 0;
				let tempStreak = 0;

				for (let i = 0; i < keys.length; i++) {
					if (habitData[keys[i]] === 'yes') {
						tempStreak++;
						longestStreak = Math.max(longestStreak, tempStreak);
					} else {
						tempStreak = 0;
					}
				}

				return { streak: currentStreak, longestStreak };
			}

			function updateStreakCounter() {

					(a, b) => b[0] - a[0],
				)) {
					if (streak >= parseInt(threshold)) {
						emoji = e;
						break;
					}
				}
				elements.streakEmoji.textContent = emoji;

				if (streak > 0 && streak % 7 === 0) {
					elements.streakCount.classList.add('streak-milestone');
					setTimeout(() => {
						elements.streakCount.classList.remove('streak-milestone');
					}, 3000);
				}

				const messages = {

					1: 'Great start! Keep going!',
					3: 'Good progress!',
					7: 'Great job!',
					14: 'Amazing consistency!',
					30: 'You are unstoppable!',
				};

				let message = 'Keep going!';
				for (const [threshold, msg] of Object.entries(messages).sort(
					(a, b) => b[0] - a[0],
				)) {
					if (streak >= parseInt(threshold)) {
						message = msg;
						break;
					}
				}
				elements.streakMessage.textContent = message;
			}

			function getWeekData() {
				const today = new Date();
				const startOfWeek = new Date(today);
				startOfWeek.setDate(today.getDate() - today.getDay());

				let total = 0;
				let completed = 0;
				const currentDate = new Date(startOfWeek);

				while (currentDate <= today) {
					total++;
					const dateKey = getDateKey(currentDate);
					if (habitData[dateKey] === 'yes') {
						completed++;
					}
					currentDate.setDate(currentDate.getDate() + 1);
				}

				return {
					total,
					completed,
					percentage: total > 0 ? Math.round((completed / total) * 100) : 0,
				};
			}

			function getMonthData() {
				const today = new Date();
				const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);

				let total = 0;
				let completed = 0;
				const currentDate = new Date(startOfMonth);

				while (currentDate <= today) {
					total++;
					const dateKey = getDateKey(currentDate);
					if (habitData[dateKey] === 'yes') {
						completed++;
					}
					currentDate.setDate(currentDate.getDate() + 1);
				}

				return {
					total,
					completed,
					percentage: total > 0 ? Math.round((completed / total) * 100) : 0,
				};
			}

			function renderSimpleStreakCalendar() {
				const today = new Date();
				const daysToShow = 30;

				let calendarHTML =
					'<div class="simple-calendar d-flex flex-wrap gap-2">';

				for (let i = daysToShow - 1; i >= 0; i--) {
					const date = new Date(today);
					date.setDate(today.getDate() - i);

					const dateKey = getDateKey(date);
					const response = habitData[dateKey];
					const isToday = i === 0;

					let bgClass = 'bg-light';
					let emoji = '⭕';

					if (response === 'yes') {
						bgClass = 'bg-success';
						emoji = '✅';
					} else if (response === 'no') {
						bgClass = 'bg-danger';
						emoji = '❌';
					}

					calendarHTML += `
            <div class="calendar-day-simple ${bgClass} ${
							isToday ? 'border border-primary border-3' : ''
						}" 
                 style="width: 40px; height: 40px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; "
                 title="${dateFormatters.display(date)}: ${
										response || 'No data'
									}">
                <span style="font-weight: bold;">${date.getDate()}</span>
                
            </div>
        `;
				}

				calendarHTML += '</div>';
				elements.streakCalendar.innerHTML = calendarHTML;
			}

			function getStreakIntensity(date, response) {
				if (response !== 'yes') return 'intensity-0';

				const dateKey = getDateKey(date);
				const keys = getSortedKeys();
				const dateIndex = keys.indexOf(dateKey);

				if (dateIndex === -1) return 'intensity-1';

				let localStreak = 1;

				// Simplified streak calculation for performance
				for (let i = dateIndex - 1; i >= 0 && i >= dateIndex - 13; i--) {
					if (habitData[keys[i]] === 'yes') {
						localStreak++;
					} else {
						break;
					}
				}

				for (
					let i = dateIndex + 1;
					i < keys.length && i <= dateIndex + 13;
					i++
				) {
					if (habitData[keys[i]] === 'yes') {
						localStreak++;
					} else {
						break;
					}
				}

				if (localStreak >= 14) return 'intensity-4';
				if (localStreak >= 7) return 'intensity-3';
				if (localStreak >= 3) return 'intensity-2';
				return 'intensity-1';
			}

			function getAdvancedStats() {
				const keys = getSortedKeys();
				const last30Days = keys.slice(-30);
				const last7Days = keys.slice(-7);

				const weeklyAverage = calculateAverage(last7Days);
				const monthlyAverage = calculateAverage(last30Days);
				const consistencyScore = calculateConsistency();
				const missedDaysThisMonth = countMissedDays(30);

				const insights = [];
				if (weeklyAverage > monthlyAverage) {
					insights.push(
						"You're improving! This week is better than your monthly average.",
					);
				}
				if (consistencyScore > 80) {
					insights.push(
						"Excellent consistency! You're building a strong habit.",
					);
				} else if (consistencyScore > 60) {
					insights.push('Good consistency. Try to maintain this momentum.');
				} else {
					insights.push(
						'Focus on consistency. Small daily actions lead to big results.',
					);
				}

				return {
					weeklyAverage,
					monthlyAverage,
					consistencyScore,
					missedDaysThisMonth,
					insights,
				};
			}

			function calculateAverage(dateKeys) {
				if (dateKeys.length === 0) return 0;
				const successCount = dateKeys.filter(
					(key) => habitData[key] === 'yes',
				).length;
				return Math.round((successCount / dateKeys.length) * 100);
			}

			function calculateConsistency() {
				const keys = getSortedKeys();
				if (keys.length < 7) return 0;

				const last30Days = keys.slice(-30);
				const weeks = [];

				for (let i = 0; i < last30Days.length; i += 7) {
					const week = last30Days.slice(i, i + 7);
					const weekSuccess = week.filter(
						(key) => habitData[key] === 'yes',
					).length;
					weeks.push(weekSuccess);
				}

				if (weeks.length === 0) return 0;

				const avgWeeklySuccess =
					weeks.reduce((a, b) => a + b, 0) / weeks.length;
				const variance =
					weeks.reduce(
						(acc, week) => acc + Math.pow(week - avgWeeklySuccess, 2),
						0,
					) / weeks.length;

				const maxVariance = 49;
				return Math.max(0, Math.round((1 - variance / maxVariance) * 100));
			}

			function countMissedDays(days) {
				const keys = getSortedKeys();
				const recentDays = keys.slice(-days);
				return recentDays.filter((key) => habitData[key] === 'no').length;
			}

			function toggleTheme() {
				const currentTheme =
					document.documentElement.getAttribute('data-theme');
				const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

				document.documentElement.setAttribute('data-theme', newTheme);
				localStorage.setItem(THEME_KEY, newTheme);
				updateThemeIcon(newTheme);
			}

			}

			function downloadExcel() {
				const keys = getSortedKeys();

				if (keys.length === 0) {
					alert('No data to export yet!');
					return;
				}

				let csvContent = 'Date,Response,Day of Week\n';
				keys.forEach((key) => {
					const date = new Date(key);
					const formattedDate = date.toLocaleDateString('en-GB', {
						year: 'numeric',
						month: '2-digit',
						day: '2-digit',
						timeZone: TIMEZONE,
					});
					const dayOfWeek = date.toLocaleDateString('en-US', {
						weekday: 'long',
						timeZone: TIMEZONE,
					});
					csvContent += `${formattedDate},${habitData[key]},${dayOfWeek}\n`;
				});

				const blob = new Blob([csvContent], {
					type: 'text/csv;charset=utf-8;',
				});
				const link = document.createElement('a');
				const url = URL.createObjectURL(blob);
				link.setAttribute('href', url);
				link.setAttribute(
					'download',
					`habit-tracker-backup-${new Date().toISOString().split('T')[0]}.csv`,
				);
				link.style.visibility = 'hidden';
				document.body.appendChild(link);
				link.click();
				document.body.removeChild(link);
			}
